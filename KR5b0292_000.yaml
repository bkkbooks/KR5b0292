front:
  text: 黃帝太一入門入式祕訣五九
  hash: sha256:9e4b133b37224fbc82766c97b382f84fcf154e5e8911bec7fa4cbfbb2fa78794
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0292_HFL_000-001a, image: hfl/0324/0324-004.png}
body:
  text: 入天門呪天門開泰六甲扶持金鎖玉鑰速在莫違掃蕩邪穢惡鬼祛之急急如律令出地戶呪四道開泰無令屯塞玉女度我勿令某甲今日大吉禍消福洽自然步驛我去地户更無憂窒急急如律令六儀擊刑百事成式六儀擊刑吾欲前去天蓬降靈白帝前引赤帝衛身敢有當我身粉骨塵急急如律令三竒入墓天有三竒惟憂某神加臨直事害乙丙丁吾奉天兵守符安寧急急如開天雲羅上帝律令返剋損明日月無精運我滅明五辰不遇太白精明吾加此聖六利九征急急如律令太白入火九天之上太白隂精運式同轉來臨火星利於戰鬪冝於郊坰惟奉天威示未來刑急急如律令火入金鄉熒惑火精來入吾金太白堅破逢火安寧彼欲害我上帝降靈急急如律令乙龍文𡖖白虎除道路青龍導引吾所作慎勿悮福德速來助天帝威神教滅鬼賊六乙相扶天道贊德吾今所行攻無不剋急急如律令丙唐仲𡖖天罡大聖揚威武常有青龍與白虎行誅天賊及天虜敢有不從仗天斧吾身得天前後遮羅青龍白虎左右祛魔朱雀導從使吾無他天威護我六丙煩痾急急如律令丁季文𡖖六丁玉女名神母呼而吸之來我護清泠之水多神草折之自障勿驚駭咄天帝弟子都統天兵賞善罰惡出幽入冥來護我者玉女六丁有害我者自滅其形急急如律令日竒印月竒印星竒印右用雷霹楓木棗木雕之用真砂嘗拭在內佩帶叩神曽孫某今欲往某處為某事事在窘促禍在頃刻不容少駐謹集九天玄女風后六甲將軍六丁玉女十二月將萬神聲集畫地成局徑往某處動輟如意百怪消亡從當日地支入局呪子日子上起天門天門急來開之我欲為某事要往殿廷速為抽取金關為我速收金錀救我形身輔我勿停出地户呪四道開泰無令屯塞玉女度我勿令某甲今日大吉禍消福洽自然步驛我去地戶更無憂窒急急如律令入天門呪天門泰開六甲扶持金鎖玉鑰速莫違掃蕩邪穢惡鬼祛之急急如律令乘玉女呪天門天門今日吉良玉女玉女侍衛我傍去行四出不逢禍殃君子見我喜樂無央所求如意萬事吉昌急急如太上帝君律令子日例餘倣此遠行買賣求官謁貴從地戶旋左入天門出玉女出軍通用攻戰報仇避難逃亡隱匿避病從天門右旋入地戶乘玉女右上去運籌亦同此法而用之太上上清八景回車畢道飛靈祕法曰太暑之正行圡旺能潜形隱跡人不見變化作別形六戊隨符印閉局用戊辰呪法天神助太清祕其名一人能作萬天地皆歸從大暑六戊隱形符左真人曰此六戊法者布局行事算視天門地户蓬星太陽太隂步罡躡斗依十干之日時入先祝心下所謀之事行算之從長認天門地戶之方明玉女守門之處然後左手提刀於鬼門取土作城壁次取六戊之符四直六戊之方以土副之按六戊印其間代之起潜於中央之地至神明無見也何況衆人乎六戊神符右此符六道按六戊以黃絹或黃紙以雌黃書攴干戊支以朱書篆先於戊辰祭之以至戊午遍祭之通靈也常用就書黃紙酒祭之若有古城以州㕔看方位六戊方所月厭州廳內空地上方取土一斗二升以財紙酒奠六神或開竅埋符以土掩之燒錢在上如其地厭穢不淨空分土燒符紙於其上甲子旬戊辰上起餘倣此無印上書日下符墨書神名右件六戊印於六戊日依日支于向旺地閉氣朱書方圖二寸八分六甲日伐檀木刻之呪曰今日之用伐木刻印天印奉勑攝然盡諸惡邪天地日月能刓天下像藏跡隱我形如天都玉井律令凡六戊安營以刀畫從本旬戊上起左行劃一周匝四圍地界了於中央立禹步而呪曰太山之陽恆山之隂盜賊不起虎狼不侵天帝奉我使我潜形城郭堅固如同金關千凶萬惡莫敢來干急急如律令念呪了地上向直旬戊方取土一斗均六堆布六戊之方念呪遂堆以刀劃下符入土封穴一斗二升土均勿語如欲試之取母牛一頭於中犢放門外終不敢入子戌卯丑相向寅巳申亥川移午辰相交未酉相合子午卯酉地戶不成借初籌布七上謹請東方功曹太衝天罡大神青帝甲乙大將謹請南方太一勝光小吉赤帝丙丁火神謹請西方傳送從魁河魁白帝庚辛大神謹請北方登明神后大吉黑帝壬癸大神降於局所侍衛我身請四方神訖便從今日日辰上一籌行籌法子戌卯丑寅巳申亥午辰未酉行六籌法訖先成天門後成地戶四仲地戶不成取下籌第一攴安辰克上自然成局右喝行籌訖次履北斗攝伏衆惡本經術曰天一之北神若人逢惡存心存信罡步念此儀則百惡莫敢害白氣混沌灌我形禹步相摧登陽明禹步訖入局心劎虛空書大隱小隱符呪若記不得刋二符黃紙朱印望空燒休門坎水地遁開門乾金天遁生門艮土雷遁傷門震木官遁杜門巽木伏遁景門離火正遁死門坤土景遁驚門兌金險遁本經曰玉女返閉局室中六尺庭六步野六十步並以為數訖便以左手執六籌長一尺二寸右手執刀吸旺氣叩齒十二通禱祝心下為某事然後却回來背旺神四旺神春卯夏午秋酉冬子啓請維某年某月某日某時謹白天父地母六甲六旬十二時辰青龍蓬星明堂太隂天門地戶玉女華蓋藏吾之身隱吾之形行不擇日出不擇時今欲遊行為某事欲仗大神謹按天文請玉女畫地數局出天門入地戶閉金關乘玉女請玉女青龍白虎朱雀玄武勾陳螣蛇六合呪曰六甲六神十二時辰乘我而行到某處所之處左右防護隨行而止隨作隨起辟除盜賊鬼魅消亡君子見我喜樂倍常小人見我戰戰惶惶男女見我供列酒漿謀我者死當我者亡今日禹步上應天罡玉女侍傍下辟不祥萬精厭伏所向無殃所治者安所攻者勝所擊者破所求者得所願者成急急如律令常王大神二千石長吏見我者愛如赤子萬姓見我者尊如父母今日謹召玉女大神隨我者進引邀我者還官復去寶旗出召神啓請訖以禹步法三步九跡丁字九步一步七尺三七二十一尺右以手執六算子執劎自艮土畫地順行周訖却插劎在艮土為鬼神衆惡自伏入局訖次履北斗召請九星步罡口遂一念斗要妙兮十二辰乘靈光兮威武陳氣髣佛兮如浮雲七變動兮上應天知變化兮有吉凶入斗宿兮遇天關合六律兮治甲兵履天英兮度天任清泠淵兮可陸沉受天柱兮擁天心從此度兮躡天禽倚天輔兮望天衝入天內兮出天蓬斗道通兮天柔險萬惡殄兮百鬼廢添福祿兮留後世入杳冥兮千萬歲急急如律令甲丙戊庚壬陽日先立天英天內左足八天柱左足三天心兩足旋左足踐四天英左足起一天禽左足五天蓬左足天蓬出天輔左足左蹺六天沖左足七天任左足二乙丁己辛癸隂日先立天蓬天內右足二天柱左足七天心右足六天英左足九天禽左足五天蓬左足一天輔左足四天衝左足三天任右足八呪曰六律九章天圓地方四時五行日月為光禹步治道蚩尤辟兵青龍挾轂白虎扶衰熒惑前引辟除不祥北斗誅惡滅去凶殃五神侍衛周遊四方左杜右稷為吾鈐縳千口萬舌惡人惡鬼虎狼盜賊緘閉伏穢急急如律令呪訖左旋入地戶出天門從玉女方而出呪曰玉女玉女護我保我玉女玉女衛我侍我無令百鬼中傷行到某處人鬼莫能識我窈窈冥冥莫視其形人見我者以為非人以為束薪人不聞其聲鬼不見其精善我者福惡我者殃百邪鬼賊當我者死值我者亡千人以上萬人之中見我者喜悅獨開我門而塞地户急急如律令便閉戶瞑目以刀反手畫作左旋三匝而出切莫返顧一直而去玉女返閉用子日丑日黃帝太一八門入式祕訣
